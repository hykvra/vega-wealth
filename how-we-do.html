<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>How We Do | Vega Wealth</title>
<meta name="description" content="Our tailored advice process — from the first conversation to ongoing partnership. Discover how Vega Wealth guides you to clear, confident financial decisions."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Poppins',sans-serif;color:#062743;background:#fff;overflow-x:hidden;padding-top:120px}
::selection{background:#FDBB3B4d;color:#062743}
a{text-decoration:none}
:root{--gold:#FDBB3B;--navy:#062743;--green:#045234}

/* ── NAV (shared) ── */
#vw-topbar{position:fixed;top:0;left:0;right:0;z-index:10000;background:var(--navy);height:40px;display:flex;align-items:center}
#vw-topbar .topbar-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;justify-content:flex-end;align-items:center;gap:24px;width:100%}
#vw-topbar .topbar-phone{display:flex;align-items:center;gap:8px;color:#fff;font-size:12px;font-weight:600;text-decoration:none;transition:color .2s}
#vw-topbar .topbar-phone:hover{color:var(--gold)}
#vw-topbar .topbar-phone svg{width:14px;height:14px;color:var(--gold);flex-shrink:0}
#vw-topbar .topbar-sep{width:1px;height:16px;background:rgba(255,255,255,.25)}
#vw-topbar .topbar-login{display:flex;align-items:center;gap:8px;color:#fff;font-size:12px;font-weight:600;text-decoration:none;cursor:pointer;background:none;border:none;transition:color .2s;padding:0}
#vw-topbar .topbar-login:hover{color:var(--gold)}
#vw-topbar .topbar-login svg{width:14px;height:14px;color:var(--gold);flex-shrink:0}
#vw-nav{position:fixed;top:40px;left:0;right:0;z-index:9999;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid #f1f5f9;box-shadow:0 1px 8px rgba(0,0,0,.06)}
#vw-nav .vw-nav-inner{max-width:1280px;margin:0 auto;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
#vw-nav .vw-logo-btn{background:none;border:none;cursor:pointer;padding:0;transition:transform .3s}
#vw-nav .vw-logo-btn:hover{transform:scale(1.05)}
#vw-nav .vw-logo-btn img{height:48px;width:auto}
#vw-desktopnav{display:none;align-items:center;gap:40px}
@media(min-width:1024px){#vw-desktopnav{display:flex}}
.vw-navlink{background:none;border:none;cursor:pointer;color:var(--navy);font-size:10px;font-weight:700;letter-spacing:.04em;transition:color .3s;padding:4px 0;position:relative}
.vw-navlink:hover,.vw-navlink.active{color:var(--gold)}
.vw-navlink.active::after{content:'';position:absolute;bottom:-4px;left:0;width:100%;height:2px;background:var(--gold)}
.vw-nav-actions{display:flex;gap:16px;padding-left:24px;border-left:1px solid #e2e8f0}
.vw-btn-meet{background:var(--gold);color:var(--navy);padding:10px 24px;border-radius:2px;font-weight:700;font-size:10px;letter-spacing:.04em;text-decoration:none;transition:all .3s;box-shadow:0 2px 8px rgba(0,0,0,.1);display:inline-block}
.vw-btn-meet:hover{background:var(--navy);color:#fff}
.vw-btn-portal{background:var(--navy);color:#fff;border:none;cursor:pointer;padding:10px 24px;border-radius:2px;font-weight:700;font-size:10px;letter-spacing:.04em;transition:all .3s;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.vw-btn-portal:hover{background:var(--gold);color:var(--navy)}
.vw-hamburger{display:flex;background:none;border:none;cursor:pointer;color:var(--navy);padding:8px}
@media(min-width:1024px){.vw-hamburger{display:none}}
#vw-mobile-menu{display:none;background:#fff;border-top:1px solid #f1f5f9;padding:40px 24px;flex-direction:column;gap:32px;box-shadow:0 20px 40px rgba(0,0,0,.1)}
#vw-mobile-menu.open{display:flex}
#vw-mobile-menu .vw-navlink{text-align:left;font-size:11px}
#vw-mobile-menu .mob-actions{display:flex;flex-direction:column;gap:16px;padding-top:24px;border-top:1px solid #f1f5f9}
#vw-mobile-menu .mob-actions a,#vw-mobile-menu .mob-actions button{display:block;padding:16px;border-radius:2px;font-weight:700;font-size:11px;letter-spacing:.04em;text-align:center;transition:all .3s;width:100%}
#vw-mobile-menu .mob-actions a{background:var(--gold);color:var(--navy);text-decoration:none}
#vw-mobile-menu .mob-actions button{background:var(--navy);color:#fff;border:none;cursor:pointer}

/* ── HERO ── */
#hero{padding:96px 24px;background:#fff;position:relative;overflow:hidden;border-bottom:1px solid #f1f5f9}
#hero .hero-bg{position:absolute;inset:0;z-index:0}
#hero .hero-bg img{width:100%;height:100%;object-fit:cover;opacity:.04}
#hero .hero-bg::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at top right,rgba(253,187,59,.05),transparent)}
#hero .hero-inner{max-width:1280px;margin:0 auto;position:relative;z-index:10;display:grid;grid-template-columns:1fr;gap:48px;align-items:center}
@media(min-width:768px){#hero .hero-inner{grid-template-columns:1fr 1fr;gap:64px}}
#hero .hero-text{}
#hero .hero-visual{display:flex;justify-content:center;align-items:center}
#hero .hero-visual svg{width:100%;max-width:420px;height:auto}
#hero .eyebrow{font-size:.875rem;font-weight:600;letter-spacing:.04em;color:#475569;border-left:3px solid var(--gold);padding-left:16px;margin-bottom:32px}
#hero h1{font-size:clamp(2.2rem,6vw,4rem);font-weight:700;color:var(--navy);line-height:1.2;letter-spacing:-.03em;margin-bottom:40px}
#hero h1 em{color:#94a3b8;font-style:italic;font-weight:300}
#hero .lead{font-size:clamp(1rem,2vw,1.15rem);color:var(--navy);font-weight:300;line-height:1.8;max-width:600px;margin-bottom:16px}
#hero .lead strong{color:var(--navy);font-weight:500;display:block;margin-top:16px}

/* ── ROADMAP NAV ── */
#roadmap-nav{padding:48px 24px;background:#fff}
#roadmap-nav .rn-card{max-width:1280px;margin:0 auto;background:#fff;border-radius:24px;box-shadow:0 20px 60px rgba(0,0,0,.05);padding:40px;border:1px solid #f1f5f9}
#roadmap-nav .rn-label{text-align:center;font-size:14px;font-weight:700;letter-spacing:.04em;color:#94a3b8;margin-bottom:40px}
#roadmap-nav .rn-steps{display:flex;flex-wrap:wrap;justify-content:center;gap:16px;position:relative}
@media(min-width:768px){#roadmap-nav .rn-steps::before{content:'';position:absolute;top:28px;left:10%;right:10%;height:1px;background:#e2e8f0;z-index:0}}
.rn-step{display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;transition:all .3s;border:none;background:none;padding:8px;position:relative;z-index:1;min-width:120px}
.rn-step .step-icon{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all .3s;border:2px solid #e2e8f0;background:#fff;color:#94a3b8;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.rn-step .step-label{font-size:13px;font-weight:700;letter-spacing:.05em;color:#94a3b8;transition:color .3s;text-align:center;line-height:1.4;max-width:120px}
.rn-step.active .step-icon{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 10px 20px rgba(4,82,52,.25);transform:scale(1.1)}
.rn-step.active .step-label{color:var(--navy)}
.rn-step:not(.active):hover .step-icon{border-color:var(--gold);color:var(--gold)}
.rn-step:not(.active):hover .step-label{color:var(--navy)}

/* ── STEP DETAIL ── */
#step-detail{padding:64px 24px;background:#fff}
#step-detail .sd-inner{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:1fr;gap:64px;align-items:center}
@media(min-width:768px){#step-detail .sd-inner{grid-template-columns:1fr 1fr}}
#step-detail .sd-text{}
#step-detail h2{font-size:clamp(2rem,4vw,3rem);font-weight:700;color:var(--navy);line-height:1.2;letter-spacing:-.03em;margin-bottom:32px}
#step-detail .sd-body{font-size:1.15rem;color:#475569;line-height:1.8;font-weight:300;margin-bottom:40px}
.sd-next{display:inline-flex;align-items:center;gap:12px;background:none;border:1px solid #e2e8f0;border-radius:99px;padding:12px 24px;cursor:pointer;font-size:.875rem;font-weight:700;color:var(--navy);transition:all .3s}
.sd-next:hover{border-color:var(--navy)}
.sd-next svg{transition:transform .3s}
.sd-next:hover svg{transform:translateX(4px)}
.sd-visual{display:flex;justify-content:center}
.sd-icon-box{position:relative;width:320px;height:320px;max-width:100%}
.sd-icon-box .back-ring{position:absolute;inset:16px;border-radius:48px;background:#f8fafc;border:1px solid #f1f5f9;transform:rotate(3deg)}
.sd-icon-box .front{position:absolute;inset:0;background:#fff;border-radius:48px;box-shadow:0 30px 60px rgba(0,0,0,.08);border:1px solid #f1f5f9;display:flex;align-items:center;justify-content:center}
.sd-icon-box .icon-bg{position:absolute;opacity:.08;color:var(--navy)}
.sd-icon-box .icon-fg{color:var(--green);position:relative;z-index:1}

/* ── ONGOING ── */
#ongoing{padding:96px 24px;background:#f8fafc;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0}
#ongoing .og-inner{max-width:1280px;margin:0 auto}
#ongoing .og-header{text-align:center;margin-bottom:80px}
#ongoing .og-header h2{font-size:clamp(2rem,4vw,3rem);font-weight:700;color:var(--navy);letter-spacing:-.03em;margin-bottom:16px}
#ongoing .og-divider{width:64px;height:4px;background:var(--gold);margin:0 auto 24px}
#ongoing .og-header p{font-size:1.1rem;color:#94a3b8;max-width:640px;margin:0 auto;line-height:1.8}
#ongoing .og-grid{display:grid;grid-template-columns:1fr;gap:32px}
@media(min-width:768px){#ongoing .og-grid{grid-template-columns:repeat(3,1fr)}}
.og-card{background:#fff;padding:40px;border-radius:40px;box-shadow:0 2px 12px rgba(0,0,0,.04);border:1px solid #f1f5f9;transition:all .5s}
.og-card:hover{box-shadow:0 20px 60px rgba(0,0,0,.1);transform:translateY(-8px);background:#fdbb3b;border-color:#fdbb3b}
.og-card .og-icon{color:var(--green);margin-bottom:24px;transition:transform .3s}
.og-card:hover .og-icon{transform:translateY(-8px)}
.og-card h3{font-size:1.4rem;font-weight:700;color:var(--navy);margin-bottom:16px}
.og-card p{font-size:.925rem;color:#94a3b8;line-height:1.75}

/* ── CTA ── */
#cta{padding:96px 24px;background:#f8fafc;position:relative;overflow:hidden}
#cta .cta-bg{position:absolute;inset:0;z-index:0}
#cta .cta-bg img{width:100%;height:100%;object-fit:cover;opacity:.05;filter:grayscale(1)}
#cta .cta-inner{max-width:800px;margin:0 auto;position:relative;z-index:10;text-align:center}
#cta h2{font-size:clamp(2rem,4vw,3rem);font-weight:700;color:var(--navy);letter-spacing:-.03em;margin-bottom:24px}
#cta .cta-divider{width:64px;height:4px;background:var(--gold);margin:0 auto 32px}
#cta p{font-size:1.15rem;color:#475569;line-height:1.8;font-weight:300;max-width:640px;margin:0 auto 40px}
#cta .cta-btn{display:inline-flex;align-items:center;gap:12px;background:var(--gold);color:var(--navy);padding:20px 48px;border-radius:6px;font-weight:800;font-size:1.1rem;box-shadow:0 8px 30px rgba(253,187,59,.4);text-decoration:none;transition:all .3s}
#cta .cta-btn:hover{background:var(--navy);color:#fff;transform:scale(1.05)}

/* ── FOOTER ── */
#vw-footer{background:#f8fafc;border-top:1px solid #e2e8f0;padding:80px 0 48px;color:var(--navy)}
#vw-footer .foot-inner{max-width:1280px;margin:0 auto;padding:0 24px}
#vw-footer .foot-grid{display:grid;grid-template-columns:1fr;gap:24px;padding-bottom:64px;border-bottom:1px solid #e2e8f0}
@media(min-width:768px){#vw-footer .foot-grid{grid-template-columns:1fr 1fr}}
@media(min-width:1024px){#vw-footer .foot-grid{grid-template-columns:1.4fr 0.6fr 1fr 1.3fr 0.7fr 1fr}}
#vw-footer .foot-logo{height:64px;width:auto;margin-bottom:24px}
#vw-footer .foot-contact{list-style:none;display:flex;flex-direction:column;gap:16px;margin-bottom:24px;padding:0}
#vw-footer .foot-contact li{display:flex;align-items:flex-start;gap:12px;font-size:.9rem;color:#475569}
#vw-footer .foot-contact li svg{width:20px;height:20px;color:var(--gold);flex-shrink:0;margin-top:2px}
#vw-footer .socials{display:flex;gap:12px}
#vw-footer .socials a{width:40px;height:40px;border-radius:50%;background:#fff;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 6px rgba(0,0,0,.06);transition:background .3s}
#vw-footer .socials a:hover{background:var(--gold)}
#vw-footer .socials a svg{width:16px;height:16px;color:var(--navy)}
#vw-footer h4{font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--gold);padding-bottom:12px;border-bottom:1px solid #f1f5f9;margin-bottom:16px}
#vw-footer ul.foot-list{list-style:none;padding:0;display:flex;flex-direction:column;gap:10px}
#vw-footer ul.foot-list li,#vw-footer ul.foot-list button{font-size:.875rem;color:#475569;font-weight:500;background:none;border:none;cursor:pointer;text-align:left;padding:0;transition:color .3s;line-height:1.6}
#vw-footer ul.foot-list li:hover,#vw-footer ul.foot-list button:hover{color:var(--gold)}
#vw-footer .btn-portal-foot{width:100%;background:var(--navy);color:#fff;border:none;cursor:pointer;padding:12px 24px;border-radius:2px;font-weight:700;font-size:13px;transition:all .3s}
#vw-footer .btn-portal-foot:hover{background:var(--gold);color:var(--navy)}
#vw-footer .foot-bottom{padding-top:48px;display:flex;flex-direction:column;gap:32px}
#vw-footer .foot-legal-row{display:flex;flex-direction:column;gap:16px;font-size:10px;font-weight:700;letter-spacing:.1em;color:#94a3b8}
@media(min-width:768px){#vw-footer .foot-legal-row{flex-direction:row;align-items:center;justify-content:space-between}}
#vw-footer .foot-legal-row a{color:#94a3b8;text-decoration:underline;text-decoration-color:#e2e8f0;text-underline-offset:4px;transition:color .3s}
#vw-footer .foot-legal-row a:hover{color:var(--gold)}
#vw-footer .foot-policy-links{display:flex;gap:32px;flex-wrap:wrap}
#vw-footer .compliance-box{background:#fff;padding:24px 32px;border-radius:12px;border:1px solid #e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,.04);display:flex;flex-direction:column;gap:16px}
#vw-footer .comp-abn{font-size:10px;font-weight:700;letter-spacing:.1em;color:#94a3b8}
#vw-footer .comp-ack{font-size:10px;color:#94a3b8;font-style:normal;border-top:1px solid #f1f5f9;padding-top:16px;line-height:1.6}
